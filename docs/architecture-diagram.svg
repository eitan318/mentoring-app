<svg viewBox="0 0 760 620" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <title>Three-Tier Architecture - MentoringApp</title>

  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#71717a"/>
    </marker>
  </defs>

  <text x="380" y="30" text-anchor="middle" font-size="16" font-weight="600" fill="#18181b">Three-Tier Architecture - MentoringApp</text>

  <!-- Presentation Tier -->
  <rect x="40" y="60" width="540" height="110" rx="10" fill="#f5f5f4" stroke="#e4e4e7"/>
  <text x="60" y="82" font-size="12" font-weight="600" fill="#6b6b6b">PRESENTATION TIER</text>

  <rect x="80" y="95" width="200" height="60" rx="8" fill="#ffffff" stroke="#d4d4d8"/>
  <text x="180" y="120" font-size="14" font-weight="600" fill="#18181b" text-anchor="middle">MentoringApp.Desktop</text>
  <text x="180" y="138" font-size="11" fill="#71717a" text-anchor="middle">WPF - MVVM - XAML Views</text>

  <rect x="340" y="95" width="200" height="60" rx="8" fill="#ffffff" stroke="#d4d4d8"/>
  <text x="440" y="120" font-size="14" font-weight="600" fill="#18181b" text-anchor="middle">MentoringApp.Web</text>
  <text x="440" y="138" font-size="11" fill="#71717a" text-anchor="middle">Blazor WASM - ApiClient</text>

  <path d="M180,160 L180,200 L300,200 L300,225" stroke="#71717a" stroke-width="1.6" fill="none" marker-end="url(#arr)"/>
  <path d="M440,160 L440,200 L320,200 L320,225" stroke="#71717a" stroke-width="1.6" fill="none" marker-end="url(#arr)"/>
  <text x="335" y="195" font-size="10.5" fill="#71717a">HTTP / REST - JSON</text>

  <!-- Application Tier -->
  <rect x="40" y="230" width="540" height="160" rx="10" fill="#eef2ff" stroke="#a5b4fc"/>
  <text x="60" y="252" font-size="12" font-weight="600" fill="#6b6b6b">APPLICATION TIER</text>

  <rect x="180" y="265" width="260" height="50" rx="8" fill="#e0e7ff" stroke="#6366f1"/>
  <text x="310" y="287" font-size="14" font-weight="600" fill="#18181b" text-anchor="middle">MentoringApp.Api</text>
  <text x="310" y="304" font-size="11" fill="#71717a" text-anchor="middle">ASP.NET Core - REST endpoints</text>

  <path d="M310,320 L310,345" stroke="#71717a" stroke-width="1.6" fill="none" marker-end="url(#arr)"/>

  <rect x="120" y="345" width="380" height="35" rx="8" fill="#e0e7ff" stroke="#6366f1"/>
  <text x="310" y="368" font-size="14" font-weight="600" fill="#18181b" text-anchor="middle">MentoringApp.Service</text>

  <path d="M310,388 L310,420" stroke="#71717a" stroke-width="1.6" fill="none" marker-end="url(#arr)"/>
  <text x="320" y="408" font-size="10.5" fill="#71717a">Repository interfaces</text>

  <!-- Data Tier -->
  <rect x="40" y="425" width="540" height="160" rx="10" fill="#fdf4ff" stroke="#e9d5ff"/>
  <text x="60" y="447" font-size="12" font-weight="600" fill="#6b6b6b">DATA TIER</text>

  <rect x="120" y="460" width="380" height="50" rx="8" fill="#ffffff" stroke="#a855f7"/>
  <text x="310" y="482" font-size="14" font-weight="600" fill="#18181b" text-anchor="middle">MentoringApp.Data</text>
  <text x="310" y="499" font-size="11" fill="#71717a" text-anchor="middle">IUserRepo - IPairRepo - SqlXxxRepo - DTOs</text>

  <path d="M310,515 L310,540" stroke="#71717a" stroke-width="1.6" fill="none" marker-end="url(#arr)"/>
  <text x="320" y="532" font-size="10.5" fill="#71717a">ADO.NET</text>

  <rect x="220" y="540" width="180" height="36" rx="8" fill="#fae8ff" stroke="#a855f7"/>
  <text x="310" y="563" font-size="14" font-weight="600" fill="#18181b" text-anchor="middle">SQLite - mentoring.db</text>

  <!-- Shared Model -->
  <rect x="610" y="60" width="120" height="525" rx="10" fill="#fefce8" stroke="#eab308" stroke-dasharray="4 3"/>
  <text x="670" y="82" font-size="12" font-weight="600" fill="#6b6b6b" text-anchor="middle">SHARED</text>

  <rect x="625" y="240" width="90" height="170" rx="8" fill="#fef9c3" stroke="#eab308"/>
  <text x="670" y="310" font-size="13" font-weight="600" fill="#18181b" text-anchor="middle">MentoringApp</text>
  <text x="670" y="326" font-size="13" font-weight="600" fill="#18181b" text-anchor="middle">.Model</text>
  <text x="670" y="360" font-size="11" fill="#71717a" text-anchor="middle">UserModel</text>
  <text x="670" y="374" font-size="11" fill="#71717a" text-anchor="middle">Pair - Issue</text>
  <text x="670" y="388" font-size="11" fill="#71717a" text-anchor="middle">Review</text>

  <path d="M625,125 L580,125" stroke="#71717a" stroke-width="1.4" fill="none" stroke-dasharray="4 3"/>
  <path d="M625,310 L500,310" stroke="#71717a" stroke-width="1.4" fill="none" stroke-dasharray="4 3"/>
  <path d="M625,485 L500,485" stroke="#71717a" stroke-width="1.4" fill="none" stroke-dasharray="4 3"/>
</svg>
